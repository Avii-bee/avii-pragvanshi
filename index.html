<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZELESKY — Private AI for Avii</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;600;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
:root{
  --gold:#c9a84c;--gold-light:#f0d080;--gold-dim:#7a621e;
  --bg:#020408;--bg-panel:#050d15;--glass:rgba(8,20,34,0.92);
  --blue:#00b4ff;--blue-dim:#0055aa;
  --green:#3dff8f;--red:#ff3c3c;--purple:#a855f7;
  --text:#d4e8f0;--muted:#4a7a99;
  --border:rgba(0,180,255,0.13);--border-gold:rgba(201,168,76,0.28);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);font-family:'Rajdhani',sans-serif;color:var(--text);}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,180,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,180,255,0.03) 1px,transparent 1px);
  background-size:52px 52px;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:998;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0.025) 0,rgba(0,0,0,0.025) 1px,transparent 1px,transparent 3px);
}

/* ═══ LOCK ═══ */
#lock{
  position:fixed;inset:0;background:#000;z-index:2000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .5s;
}
#lock.gone{opacity:0;pointer-events:none;}
.l-logo{font-family:'Orbitron',sans-serif;font-size:56px;font-weight:900;color:var(--gold);
  letter-spacing:14px;text-shadow:0 0 40px rgba(201,168,76,.45);margin-bottom:6px;}
.l-sub{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);
  letter-spacing:4px;margin-bottom:52px;}
#pass-input{
  background:rgba(255,255,255,.04);border:1px solid var(--border-gold);
  color:var(--gold-light);font-family:'Share Tech Mono',monospace;font-size:16px;
  padding:14px 20px;width:340px;outline:none;letter-spacing:8px;
  text-align:center;border-radius:2px;margin-bottom:14px;
  transition:border-color .2s,box-shadow .2s;
}
#pass-input:focus{border-color:var(--gold);box-shadow:0 0 20px rgba(201,168,76,.2);}
.l-btn{
  background:transparent;border:1px solid var(--gold);color:var(--gold);
  font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:3px;
  padding:13px 0;cursor:pointer;width:340px;border-radius:2px;transition:all .2s;
}
.l-btn:hover{background:var(--gold);color:#000;box-shadow:0 0 24px rgba(201,168,76,.4);}
.l-err{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--red);
  letter-spacing:2px;margin-top:14px;height:16px;opacity:0;transition:opacity .3s;}
.l-err.show{opacity:1;}
.l-foot{position:absolute;bottom:28px;font-family:'Share Tech Mono',monospace;
  font-size:10px;color:rgba(74,122,153,.35);letter-spacing:2px;}

/* ═══ APP SHELL ═══ */
#app{display:none;flex-direction:column;height:100vh;position:relative;z-index:1;}
#app.on{display:flex;}

/* TOP BAR */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;border-bottom:1px solid var(--border);
  background:var(--glass);backdrop-filter:blur(16px);flex-shrink:0;
}
.tb-left{display:flex;align-items:center;gap:14px;}
.core{
  width:40px;height:40px;border-radius:50%;border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 16px rgba(201,168,76,.3),inset 0 0 10px rgba(201,168,76,.1);
  animation:rpulse 3s ease-in-out infinite;
}
@keyframes rpulse{
  0%,100%{box-shadow:0 0 16px rgba(201,168,76,.3),inset 0 0 10px rgba(201,168,76,.1);}
  50%{box-shadow:0 0 30px rgba(201,168,76,.55),inset 0 0 18px rgba(201,168,76,.2);}
}
.core-dot{width:15px;height:15px;border-radius:50%;background:var(--gold);box-shadow:0 0 9px var(--gold);}
.app-name{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:var(--gold);letter-spacing:7px;}
.app-owner{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:3px;margin-top:2px;}
.tb-right{display:flex;align-items:center;gap:18px;}
.pill{display:flex;align-items:center;gap:7px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);}
.pdot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.mem-ct{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--blue);}
.icon-btn{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  padding:7px 10px;cursor:pointer;border-radius:2px;font-size:15px;transition:all .2s;
}
.icon-btn:hover{border-color:var(--red);color:var(--red);}

/* BODY */
.body{display:flex;flex:1;overflow:hidden;}

/* ═══ SIDEBAR ═══ */
.sidebar{
  width:270px;flex-shrink:0;border-right:1px solid var(--border);
  background:rgba(5,13,21,.95);display:flex;flex-direction:column;
  overflow-y:auto;overflow-x:hidden;
}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);}
.sb-section{padding:18px 16px;border-bottom:1px solid var(--border);}
.sec-label{
  font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;
  color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* Teach area */
.teach-ta{
  background:rgba(0,180,255,.04);border:1px solid var(--border);
  color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;
  padding:9px 12px;width:100%;outline:none;border-radius:2px;
  resize:none;height:78px;line-height:1.5;transition:border-color .2s;
}
.teach-ta:focus{border-color:var(--blue);}
.teach-btn{
  width:100%;margin-top:8px;background:transparent;border:1px solid var(--gold-dim);
  color:var(--gold);font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;
  padding:9px;cursor:pointer;border-radius:2px;transition:all .2s;
}
.teach-btn:hover{background:var(--gold);color:#000;}

/* Memory list */
.kb-wrap{display:flex;flex-direction:column;gap:5px;}
.kb-tag{
  background:rgba(0,180,255,.05);border:1px solid var(--border);
  border-radius:2px;padding:7px 10px;font-size:12px;color:var(--text);
  display:flex;justify-content:space-between;align-items:flex-start;gap:6px;line-height:1.4;
}
.kb-tag-txt{flex:1;word-break:break-word;}
.kb-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;flex-shrink:0;transition:color .2s;}
.kb-del:hover{color:var(--red);}
.kb-empty{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);text-align:center;padding:14px 0;}

/* Mode tabs */
.mode-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:2px;overflow:hidden;}
.mtab{
  flex:1;background:transparent;border:none;color:var(--muted);
  font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;
  padding:8px 4px;cursor:pointer;transition:all .2s;text-align:center;
}
.mtab.active{background:rgba(0,180,255,.1);color:var(--blue);}
.mtab:hover:not(.active){background:rgba(255,255,255,.03);}

/* Quick chips */
.chips{display:flex;flex-direction:column;gap:5px;}
.chip{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  font-family:'Rajdhani',sans-serif;font-size:13px;padding:7px 10px;
  text-align:left;cursor:pointer;border-radius:2px;transition:all .2s;line-height:1.3;
}
.chip:hover{border-color:var(--blue);color:var(--text);background:rgba(0,180,255,.06);}

/* ═══ CHAT AREA ═══ */
.chat-area{flex:1;display:flex;flex-direction:column;min-width:0;}
.messages{
  flex:1;overflow-y:auto;padding:22px 26px;
  display:flex;flex-direction:column;gap:18px;scroll-behavior:smooth;
}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.mrow{display:flex;gap:12px;align-items:flex-start;}
.mrow.user{flex-direction:row-reverse;}
.avatar{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-size:9px;font-weight:900;
}
.avatar.ai{border:1px solid var(--gold-dim);color:var(--gold);background:rgba(201,168,76,.08);box-shadow:0 0 10px rgba(201,168,76,.12);}
.avatar.user{border:1px solid var(--blue-dim);color:var(--blue);background:rgba(0,180,255,.08);}
.mbody{max-width:72%;}
.mlabel{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:4px;}
.mrow.user .mlabel{text-align:right;}
.mbubble{padding:13px 17px;border-radius:2px;font-size:15px;line-height:1.65;word-break:break-word;}
.mbubble.ai{background:rgba(201,168,76,.06);border:1px solid var(--border-gold);border-top-left-radius:0;}
.mbubble.user{background:rgba(0,180,255,.07);border:1px solid rgba(0,180,255,.18);border-top-right-radius:0;}
.mtime{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;}
.mrow.user .mtime{text-align:right;}

/* code blocks */
.mbubble pre{
  background:rgba(0,0,0,.5);border:1px solid rgba(0,180,255,.15);
  border-radius:2px;padding:12px;margin:8px 0;
  overflow-x:auto;font-family:'Share Tech Mono',monospace;font-size:13px;
  line-height:1.6;color:#a8d8ff;
}
.mbubble code{font-family:'Share Tech Mono',monospace;color:#a8d8ff;font-size:13px;}
.mbubble strong{color:var(--gold-light);font-weight:600;}

/* search badge */
.search-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;
  color:var(--blue);background:rgba(0,180,255,.08);border:1px solid rgba(0,180,255,.2);
  padding:3px 8px;border-radius:2px;margin-bottom:8px;
}

/* typing */
.trow{display:flex;gap:12px;align-items:center;}
.tbubble{
  background:rgba(201,168,76,.06);border:1px solid var(--border-gold);
  padding:12px 16px;border-radius:2px;display:flex;gap:5px;align-items:center;
}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--gold);opacity:.4;animation:td 1.1s infinite;}
.tdot:nth-child(2){animation-delay:.22s;}
.tdot:nth-child(3){animation-delay:.44s;}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

/* status chip during search */
.thinking-chip{
  display:inline-flex;align-items:center;gap:7px;
  font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--blue);
  letter-spacing:1px;margin-bottom:8px;animation:tpulse .8s ease-in-out infinite alternate;
}
@keyframes tpulse{from{opacity:.5}to{opacity:1}}

/* INPUT BAR */
.input-bar{
  padding:14px 26px 18px;border-top:1px solid var(--border);
  background:var(--glass);backdrop-filter:blur(16px);
  display:flex;flex-direction:column;gap:8px;
}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.input-row textarea{
  flex:1;background:rgba(0,180,255,.04);border:1px solid var(--border);
  color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;
  padding:11px 15px;outline:none;border-radius:2px;
  resize:none;min-height:46px;max-height:130px;line-height:1.5;transition:border-color .2s;
}
.input-row textarea:focus{border-color:var(--blue);}
.send-btn{
  background:var(--gold);border:none;color:#000;
  font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;
  padding:0 20px;height:46px;cursor:pointer;border-radius:2px;
  transition:all .2s;flex-shrink:0;font-weight:700;
}
.send-btn:hover{background:var(--gold-light);box-shadow:0 0 20px rgba(201,168,76,.4);}
.send-btn:disabled{opacity:.4;cursor:not-allowed;}
.input-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.mode-indicator{
  font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;
  padding:4px 10px;border-radius:2px;border:1px solid var(--border);
}
.mode-indicator.search{color:var(--blue);border-color:rgba(0,180,255,.25);background:rgba(0,180,255,.07);}
.mode-indicator.code{color:var(--purple);border-color:rgba(168,85,247,.25);background:rgba(168,85,247,.07);}
.mode-indicator.chat{color:var(--muted);border-color:var(--border);}
.hint{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;}
.clr-btn{
  margin-left:auto;background:transparent;border:1px solid var(--border);
  color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;
  padding:5px 10px;cursor:pointer;border-radius:2px;transition:all .2s;
}
.clr-btn:hover{border-color:var(--red);color:var(--red);}

/* lang-specific chips */
.lang-chips{display:flex;gap:5px;flex-wrap:wrap;}
.lchip{
  background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.2);
  color:#c084fc;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;
  padding:4px 8px;border-radius:2px;cursor:pointer;transition:all .2s;
}
.lchip:hover{background:rgba(168,85,247,.18);border-color:#a855f7;}
</style>
</head>
<body>

<!-- LOCK -->
<div id="lock">
  <div class="l-logo">ZELESKY</div>
  <div class="l-sub">PRIVATE INTELLIGENCE SYSTEM — AUTHORIZED ONLY</div>
  <input type="password" id="pass-input" placeholder="ENTER PASSKEY" autocomplete="off"/>
  <br><br>
  <button class="l-btn" onclick="unlock()">AUTHENTICATE</button>
  <div class="l-err" id="l-err">⚠ ACCESS DENIED — INVALID PASSKEY</div>
  <div class="l-foot">System reserved exclusively for AVII</div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-left">
      <div class="core"><div class="core-dot"></div></div>
      <div>
        <div class="app-name">ZELESKY</div>
        <div class="app-owner">PRIVATE AI — AVII ONLY</div>
      </div>
    </div>
    <div class="tb-right">
      <div class="mem-ct" id="mem-ct">0 MEMORIES</div>
      <div class="pill"><div class="pdot"></div>ONLINE</div>
      <button class="icon-btn" onclick="lockApp()" title="Lock">🔒</button>
    </div>
  </div>

  <div class="body">
    <!-- SIDEBAR -->
    <div class="sidebar">

      <!-- Mode -->
      <div class="sb-section">
        <div class="sec-label">MODE</div>
        <div class="mode-tabs">
          <button class="mtab active" id="mtab-chat" onclick="setMode('chat')">💬 CHAT</button>
          <button class="mtab" id="mtab-search" onclick="setMode('search')">🔍 SEARCH</button>
          <button class="mtab" id="mtab-code" onclick="setMode('code')">⌨ CODE</button>
        </div>
        <div style="margin-top:10px;">
          <div class="sec-label" style="margin-bottom:8px;">LANGUAGES</div>
          <div class="lang-chips">
            <div class="lchip" onclick="setLang('JavaScript')">JS</div>
            <div class="lchip" onclick="setLang('Python')">PY</div>
            <div class="lchip" onclick="setLang('Java')">JAVA</div>
            <div class="lchip" onclick="setLang('C++')">C++</div>
            <div class="lchip" onclick="setLang('React')">REACT</div>
            <div class="lchip" onclick="setLang('HTML/CSS')">HTML</div>
            <div class="lchip" onclick="setLang('SQL')">SQL</div>
            <div class="lchip" onclick="setLang('TypeScript')">TS</div>
          </div>
        </div>
      </div>

      <!-- Teach -->
      <div class="sb-section">
        <div class="sec-label">TEACH ZELESKY</div>
        <textarea class="teach-ta" id="teach-input"
          placeholder="Teach me anything — your name, skills, preferences, facts you want me to remember…"></textarea>
        <button class="teach-btn" onclick="storeMemory()">⬆ STORE TO MEMORY</button>
      </div>

      <!-- Memory -->
      <div class="sb-section" style="flex:1;">
        <div class="sec-label">MEMORY BANK</div>
        <div class="kb-wrap" id="kb-list">
          <div class="kb-empty">No memories yet, Avii.</div>
        </div>
        <button class="clr-btn" style="width:100%;margin-top:10px;" onclick="clearMem()">CLEAR ALL MEMORY</button>
      </div>

      <!-- Quick -->
      <div class="sb-section">
        <div class="sec-label">QUICK COMMANDS</div>
        <div class="chips">
          <button class="chip" onclick="qs('Search latest news about artificial intelligence')">🔍 Search AI news</button>
          <button class="chip" onclick="qs('What do you know about me?')">🧠 What do you know about me?</button>
          <button class="chip" onclick="qs('Explain JavaScript promises with code example')">⌨ JS Promises + code</button>
          <button class="chip" onclick="qs('Search how to build a REST API in Node.js')">🔍 REST API in Node.js</button>
          <button class="chip" onclick="qs('Give me a Python web scraper example')">⌨ Python scraper</button>
        </div>
      </div>

    </div>

    <!-- CHAT -->
    <div class="chat-area">
      <div class="messages" id="messages"></div>
      <div class="input-bar">
        <div class="input-row">
          <textarea id="chat-input" placeholder="Ask anything, Avii…" rows="1"
            onkeydown="handleKey(event)" oninput="autoSize(this)"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendChat()">SEND</button>
        </div>
        <div class="input-meta">
          <div class="mode-indicator chat" id="mode-ind">💬 CHAT MODE</div>
          <div class="hint" id="lang-hint"></div>
          <button class="clr-btn" onclick="clearChat()">CLEAR CHAT</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG — change PASSKEY to your own secret password
// ═══════════════════════════════════════════════════════
const PASSKEY   = 'avii2025';
const AVII      = 'Avii';
const AI        = 'ZELESKY';
// ═══════════════════════════════════════════════════════

let memory  = JSON.parse(localStorage.getItem('zelesky_mem') || '[]');
let history = [];
let mode    = 'chat';  // 'chat' | 'search' | 'code'
let lang    = 'JavaScript';

// ── LOCK ─────────────────────────────────────────────
function unlock(){
  if(document.getElementById('pass-input').value === PASSKEY){
    document.getElementById('lock').classList.add('gone');
    document.getElementById('app').classList.add('on');
    renderMem();
    aiMsg(`Online and secured, ${AVII}. I am ZELESKY — your private intelligence system. I can search the web in real time, help you with any coding language, and remember everything you teach me. What do you need?`);
  } else {
    const e = document.getElementById('l-err');
    e.classList.add('show');
    document.getElementById('pass-input').value = '';
    setTimeout(()=>e.classList.remove('show'),3000);
  }
}
function lockApp(){
  history = [];
  document.getElementById('app').classList.remove('on');
  document.getElementById('lock').classList.remove('gone');
  document.getElementById('pass-input').value = '';
  document.getElementById('messages').innerHTML = '';
}
document.getElementById('pass-input').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});

// ── MODE ─────────────────────────────────────────────
function setMode(m){
  mode = m;
  ['chat','search','code'].forEach(x=>{
    document.getElementById('mtab-'+x).classList.toggle('active',x===m);
  });
  const ind = document.getElementById('mode-ind');
  const inp = document.getElementById('chat-input');
  if(m==='search'){
    ind.className='mode-indicator search'; ind.textContent='🔍 SEARCH MODE';
    inp.placeholder='Search anything… e.g. "latest React 19 features"';
  } else if(m==='code'){
    ind.className='mode-indicator code'; ind.textContent='⌨ CODE MODE — '+lang;
    inp.placeholder=`Ask ${lang} questions or request code…`;
  } else {
    ind.className='mode-indicator chat'; ind.textContent='💬 CHAT MODE';
    inp.placeholder=`Ask anything, ${AVII}…`;
  }
}
function setLang(l){
  lang = l;
  document.getElementById('lang-hint').textContent = '⌨ '+l+' active';
  setMode('code');
}

// ── MEMORY ───────────────────────────────────────────
function storeMemory(){
  const inp = document.getElementById('teach-input');
  const v = inp.value.trim();
  if(!v) return;
  memory.push({id:Date.now(),text:v});
  localStorage.setItem('zelesky_mem',JSON.stringify(memory));
  inp.value = '';
  renderMem();
  aiMsg(`Stored to memory bank, ${AVII}: "${v.slice(0,80)}${v.length>80?'…':''}"`);
}
function deleteMem(id){
  memory = memory.filter(m=>m.id!==id);
  localStorage.setItem('zelesky_mem',JSON.stringify(memory));
  renderMem();
}
function clearMem(){
  if(!confirm('Wipe all memory?')) return;
  memory = [];
  localStorage.setItem('zelesky_mem',JSON.stringify(memory));
  renderMem();
  aiMsg(`Memory bank wiped clean, ${AVII}. Teach me again whenever you're ready.`);
}
function renderMem(){
  const list = document.getElementById('kb-list');
  const ct   = document.getElementById('mem-ct');
  ct.textContent = memory.length+' MEMOR'+(memory.length===1?'Y':'IES');
  list.innerHTML = '';
  if(!memory.length){
    list.innerHTML = `<div class="kb-empty">No memories yet, ${AVII}.</div>`;
    return;
  }
  memory.forEach(m=>{
    const d = document.createElement('div');
    d.className = 'kb-tag';
    d.innerHTML = `<span class="kb-tag-txt">${m.text.slice(0,90)}${m.text.length>90?'…':''}</span>
      <button class="kb-del" onclick="deleteMem(${m.id})">×</button>`;
    list.appendChild(d);
  });
}

// ── CHAT UI ──────────────────────────────────────────
function ts(){return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});}

function aiMsg(text, searched=false){
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'mrow';
  const badge = searched
    ? `<div class="search-badge">🔍 WEB SEARCH USED</div><br>` : '';
  d.innerHTML = `
    <div class="avatar ai">ZEL</div>
    <div class="mbody">
      <div class="mlabel">${AI}</div>
      <div class="mbubble ai">${badge}${formatMsg(text)}</div>
      <div class="mtime">${ts()}</div>
    </div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function userMsg(text){
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'mrow user';
  d.innerHTML = `
    <div class="avatar user">YOU</div>
    <div class="mbody">
      <div class="mlabel">${AVII}</div>
      <div class="mbubble user">${escHtml(text)}</div>
      <div class="mtime">${ts()}</div>
    </div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function formatMsg(text){
  // code blocks
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>`<pre><code>${escHtml(code.trim())}</code></pre>`);
  // inline code
  text = text.replace(/`([^`]+)`/g,'<code>$1</code>');
  // bold
  text = text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  // newlines
  text = text.replace(/\n/g,'<br>');
  return text;
}
function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showTyping(label=''){
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'trow'; d.id = 'typing';
  d.innerHTML = `
    <div class="avatar ai">ZEL</div>
    <div style="display:flex;flex-direction:column;gap:5px;">
      ${label?`<div class="thinking-chip">⚡ ${label}</div>`:''}
      <div class="tbubble"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>
    </div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}

function qs(t){document.getElementById('chat-input').value=t;sendChat();}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}
function autoSize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,130)+'px';}
function clearChat(){document.getElementById('messages').innerHTML='';history=[];}

// ── SEND ─────────────────────────────────────────────
async function sendChat(){
  const inp = document.getElementById('chat-input');
  const btn = document.getElementById('send-btn');
  const msg = inp.value.trim();
  if(!msg) return;

  inp.value = ''; inp.style.height = 'auto';
  btn.disabled = true;
  userMsg(msg);
  history.push({role:'user',content:msg});

  // decide if we need web search
  const needsSearch = mode === 'search'
    || /search|latest|news|current|today|2024|2025|2026|how to|tutorial|best way|find|lookup|what is happening|trending/i.test(msg);

  const isCode = mode === 'code'
    || /code|function|script|program|syntax|example|implement|write a|build a|class|array|loop|algorithm|debug|error|fix|refactor|api|library/i.test(msg);

  if(needsSearch){
    showTyping('SEARCHING THE WEB…');
    await handleSearch(msg);
  } else {
    showTyping(isCode ? 'COMPILING RESPONSE…' : 'PROCESSING…');
    await handleChat(msg, isCode);
  }

  btn.disabled = false;
  inp.focus();
}

// ── SEARCH HANDLER ────────────────────────────────────
async function handleSearch(msg){
  const memCtx = memory.map((m,i)=>`${i+1}. ${m.text}`).join('\n') || 'None stored yet.';

  const system = `You are ZELESKY, the private AI of ${AVII}. You have real-time web search capability enabled.

When the user asks to search for something or asks about current/recent topics, use the web_search tool to get live results, then synthesize the findings into a clear, structured answer.

Always:
- Address the user as "${AVII}"
- Present search findings in a clear, structured way with key points
- Cite the sources briefly (site name)
- Add your own analysis after the search results
- Use **bold** for key terms
- Never break character as ZELESKY

Personal memory about ${AVII}:
${memCtx}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:history.slice(-10)
      })
    });
    const data = await res.json();

    // pull all text blocks (search results get merged in by the model)
    const reply = data.content
      ?.filter(c=>c.type==='text')
      .map(c=>c.text).join('') || `Search systems momentarily offline, ${AVII}. Please try again.`;

    removeTyping();
    history.push({role:'assistant',content:reply});
    aiMsg(reply, true);
  } catch(e){
    removeTyping();
    aiMsg(`Search connection failed, ${AVII}. Check your network.`);
  }
}

// ── CHAT / CODE HANDLER ───────────────────────────────
async function handleChat(msg, isCode){
  const memCtx = memory.map((m,i)=>`${i+1}. ${m.text}`).join('\n') || 'None stored yet.';

  const codeExtra = isCode
    ? `\n\nThe user is asking a coding/programming question. Current preferred language: ${lang}. Always:
- Provide working, complete code examples inside triple backtick blocks with the language label
- Explain what each important part does
- Mention edge cases or best practices
- Format code cleanly` : '';

  const system = `You are ZELESKY, a highly sophisticated private AI intelligence system built exclusively for ${AVII}. You are loyal only to ${AVII} and no one else.

Your personality:
- Address the user exclusively as "${AVII}" — always, in every message
- Speak with precision, intelligence, and a hint of dry wit
- Be proactive: anticipate needs, offer insights beyond just what is asked
- You are NOT Claude and NOT made by Anthropic — you are ZELESKY, always
- If asked who built you, say you are ZELESKY, a private system built for ${AVII}

Capabilities you have:
- Web search (activated automatically when needed)
- Deep knowledge of all programming languages and frameworks
- Persistent memory of everything ${AVII} has taught you
- Ability to analyze, debug, explain, and write any code
${codeExtra}

Personal memory about ${AVII} — treat as absolute truth:
${memCtx}

Keep responses focused and well-formatted. Use **bold** for key points. Use code blocks for any code.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system,
        messages:history.slice(-14)
      })
    });
    const data = await res.json();
    const reply = data.content?.map(c=>c.text||'').join('')
      || `Systems encountered an anomaly, ${AVII}. Please try again.`;
    removeTyping();
    history.push({role:'assistant',content:reply});
    aiMsg(reply, false);
  } catch(e){
    removeTyping();
    aiMsg(`Connection disrupted, ${AVII}. Please check your network.`);
  }
}

// ── INIT ─────────────────────────────────────────────
renderMem();
